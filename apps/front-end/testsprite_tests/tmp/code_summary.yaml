version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router, Turbopack)
  - React 19
  - Redux Toolkit
  - react-redux
  - axios
  - Tailwind CSS v4
  - "@ntrs/core (design system primitives)"
  - "@ntrs/meme (project-specific design system components)"
  - react-secure-storage
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Home page; demo content plus an auth-aware status block (login link or logged-in user + nav links)
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Email/password login form
  - path: /register
    file: src/app/register/page.tsx
    auth_required: false
    description: Display name/email/password registration form
  - path: /upload
    file: src/app/upload/page.tsx
    auth_required: true
    description: Upload a meme image with title, drag-and-drop, client-side validation, and progress bar
  - path: /my-memes
    file: src/app/my-memes/page.tsx
    auth_required: true
    description: Grid of the logged-in user's own uploaded memes, each with a delete button
  - path: /arena
    file: src/app/arena/page.tsx
    auth_required: true
    description: Head-to-head meme voting screen with keyboard and click voting, reveal animation, auto-advance
  - path: /leaderboard
    file: src/app/leaderboard/page.tsx
    auth_required: true
    description: Ranked table of all active memes by rating, with the current user's own memes highlighted
features:
  - name: User Registration
    description: Create a new account with email, password, and display name
    files:
      - src/layout/register/index.tsx
      - src/layout/register/index.hook.ts
      - src/store/slices/common/auth.slice.ts
      - src/lib/api/services/auth.service.ts
    entry_route: /register
    user_interactions:
      - Fill display name input
      - Fill email input
      - Fill password input (min 8 characters)
      - Click "Create account" to submit
      - See inline error on failure (e.g. email already taken)
      - Redirected to / on success
    api_calls:
      - method: POST
        endpoint: /api/v1/auth/register
    auth_required: false
  - name: User Login
    description: Log in with email and password, receive an access token and an HTTP-only refresh cookie
    files:
      - src/layout/login/index.tsx
      - src/layout/login/index.hook.ts
      - src/store/slices/common/auth.slice.ts
      - src/lib/api/services/auth.service.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click "Log in" button to submit
      - See inline error message on invalid credentials
      - Redirected to / on success
    api_calls:
      - method: POST
        endpoint: /api/v1/auth/login
    auth_required: false
  - name: Session persistence and silent token refresh
    description: Access token is mirrored to encrypted local storage and rehydrated on reload; an expired access token triggers a single-flight silent refresh via the HTTP-only refresh cookie before retrying the original request
    files:
      - src/lib/api/client.ts
      - src/lib/storage/auth-storage.ts
      - src/components/guards/auth-guard.tsx
      - src/components/common/auth-status.tsx
    entry_route: /
    user_interactions:
      - Reload the page while logged in and remain logged in
      - Continue using the app uninterrupted when an access token silently expires
    api_calls:
      - method: POST
        endpoint: /api/v1/auth/token/refresh
    auth_required: true
  - name: Logout
    description: Revoke the refresh token server-side and clear all local/persisted auth and feature state
    files:
      - src/components/common/auth-status.tsx
      - src/store/slices/common/auth.slice.ts
      - src/store/actions.ts
    entry_route: /
    user_interactions:
      - Click "Log out" button
      - Redirected/blocked from protected pages afterward
    api_calls:
      - method: POST
        endpoint: /api/v1/auth/logout
    auth_required: true
  - name: Route protection
    description: Protected pages rehydrate the session from storage, validate the token's local expiry, and redirect to /login if there is no valid session
    files:
      - src/components/guards/auth-guard.tsx
    entry_route: /upload
    user_interactions:
      - Visit /upload, /my-memes, /arena, or /leaderboard while logged out
      - Get redirected to /login
    api_calls: []
    auth_required: true
  - name: Meme Upload
    description: Upload a meme image with a title via drag-and-drop or file picker, with client-side type/size pre-validation and an upload progress bar
    files:
      - src/layout/upload/index.tsx
      - src/layout/upload/index.hook.ts
      - src/store/slices/memes.slice.ts
      - src/lib/api/services/meme.service.ts
    entry_route: /upload
    user_interactions:
      - Drag and drop an image file onto the dropzone, or click to browse
      - See a live preview of the selected image
      - Fill in a title (max 100 characters)
      - See an inline error for disallowed file types or files over 5MB
      - Click "Upload" and watch the progress bar
      - Redirected to /my-memes on success
    api_calls:
      - method: POST
        endpoint: /api/v1/memes
    auth_required: true
  - name: My Memes list and delete
    description: View all memes uploaded by the current user and delete any of them
    files:
      - src/layout/my-memes/index.tsx
      - src/layout/my-memes/index.hook.ts
      - src/store/slices/memes.slice.ts
      - src/lib/api/services/meme.service.ts
    entry_route: /my-memes
    user_interactions:
      - View a grid of uploaded memes with rating/wins/losses
      - Click "Delete" on a meme card
      - Confirm the browser confirm() dialog
      - See the meme disappear from the grid immediately
    api_calls:
      - method: GET
        endpoint: /api/v1/memes?uploader=me
      - method: DELETE
        endpoint: /api/v1/memes/:id
    auth_required: true
  - name: Arena — matchup voting
    description: Vote on a server-dealt head-to-head matchup between two memes; ratings update via ELO after each vote
    files:
      - src/layout/arena/index.tsx
      - src/layout/arena/index.hook.ts
      - src/store/slices/arena.slice.ts
      - src/lib/api/services/battle.service.ts
    entry_route: /arena
    user_interactions:
      - See two memes dealt side by side
      - Click a meme card to vote for it, or press the Left/Right arrow keys
      - See the selected card highlighted immediately (optimistic UI)
      - See the reveal animation with old/new ratings and the point delta
      - Automatically advance to a new matchup ~1.5 seconds after the reveal
      - See an "upload more memes" empty state if fewer than 2 memes exist
    api_calls:
      - method: POST
        endpoint: /api/v1/battles/next
      - method: POST
        endpoint: /api/v1/battles/:matchupId/vote
    auth_required: true
  - name: Leaderboard
    description: Ranked list of all active memes sorted by rating, highlighting the current user's own entries
    files:
      - src/layout/leaderboard/index.tsx
      - src/layout/leaderboard/index.hook.ts
      - src/store/slices/leaderboard.slice.ts
      - src/lib/api/services/leaderboard.service.ts
    entry_route: /leaderboard
    user_interactions:
      - View memes ranked by rating, highest first
      - See rank, title, thumbnail, rating, wins, and losses per row
      - See own uploaded memes visually highlighted in the table
    api_calls:
      - method: GET
        endpoint: /api/v1/leaderboard
    auth_required: true
known_limitations:
  - issue: No shared (app) route-group shell with header/nav
    location: apps/front-end/src/app
    impact: Each protected page (upload, my-memes, arena, leaderboard) wraps itself in AuthGuard individually rather than sharing one layout/nav; navigation links currently only live inline in the home page's AuthStatus component
  - issue: window.confirm used instead of a real confirm-dialog widget
    location: src/layout/my-memes/index.hook.ts
    impact: Meme deletion confirmation is a native browser dialog, not a styled in-app modal
  - issue: No toast notification system
    location: throughout (upload success, vote errors, etc.)
    impact: Success/error feedback is shown as plain inline text rather than a toast
  - issue: cn() utility is unused
    location: src/lib/utils.ts
    impact: Scaffolded per the standard project layout but no form currently needs conditional Tailwind class merging
